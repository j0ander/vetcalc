<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCalc Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Source+Sans+3:wght@100..900&display=swap"
    rel="stylesheet">

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            // 🎨 TU NUEVA PALETA
            primary: {
              DEFAULT: '#F9A825',
              light: '#FBC94D',
              dark: '#C47D0A',
            },
            secondary: {
              DEFAULT: '#00ACC1',
              light: '#4DD0E1',
              dark: '#00838F',
            },
            tertiary: {
              DEFAULT: '#FF7043',
              light: '#FF8A65',
              dark: '#D84315',
            },
            neutral: {
              DEFAULT: '#FDFBF7',
              dark: '#E8E3D5',
              darker: '#D4CDB8',
            },
            // Colores de sistema (para compatibilidad)
            surface: '#FDFBF7',
            'on-surface': '#1F2A3A',
            error: '#ba1a1a',
            'on-error': '#ffffff',
          },
          borderRadius: {
            DEFAULT: '0.25rem',
            lg: '0.5rem',
            xl: '0.75rem',
            full: '9999px',
          },
          spacing: {
            'touch-target-min': '48px',
            base: '8px',
            'stack-lg': '24px',
            gutter: '12px',
            'container-padding': '16px',
            'stack-sm': '4px',
            'stack-md': '16px',
          },
          fontFamily: {
            'label-sm': ['Inter'],
            'body-md': ['Source Sans 3'],
            'headline-lg-mobile': ['Inter'],
            'headline-lg': ['Inter'],
            'label-md': ['Inter'],
            'body-lg': ['Source Sans 3'],
            'headline-md': ['Inter'],
            'headline-xl': ['Inter'],
          },
          fontSize: {
            'label-sm': ['12px', { lineHeight: '16px', fontWeight: '600' }],
            'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
            'headline-lg-mobile': ['22px', { lineHeight: '28px', fontWeight: '600' }],
            'headline-lg': ['24px', { lineHeight: '32px', letterSpacing: '-0.01em', fontWeight: '600' }],
            'label-md': ['14px', { lineHeight: '20px', letterSpacing: '0.01em', fontWeight: '500' }],
            'body-lg': ['18px', { lineHeight: '26px', fontWeight: '400' }],
            'headline-md': ['20px', { lineHeight: '28px', fontWeight: '600' }],
            'headline-xl': ['32px', { lineHeight: '40px', letterSpacing: '-0.02em', fontWeight: '700' }],
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'pulse-soft': 'pulseSoft 2.5s ease-in-out infinite',
            'spin-slow': 'spin 1.2s linear infinite',
            'brand-pulse': 'brand-pulse 3s ease-in-out infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { transform: 'scale(1)', opacity: '0.9' },
              '50%': { transform: 'scale(1.03)', opacity: '1' },
            },
            'brand-pulse': {
              '0%,100%': { transform: 'scale(1)', opacity: '1' },
              '50%': { transform: 'scale(1.02)', opacity: '0.95' },
            },
            spin: {
              from: { transform: 'rotate(0deg)' },
              to: { transform: 'rotate(360deg)' },
            },
          },
        },
      },
    };
  </script>

  <style>
    /* === ESTILOS PERSONALIZADOS CON LA NUEVA PALETA === */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #FDFBF7;
      /* neutral */
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
      margin: 0;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 768px) {
      .bento-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .ripple {
      position: absolute;
      background: rgba(249, 168, 37, 0.15);
      /* primary con opacidad */
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      animation: ripple-animation 0.6s linear;
    }

    @keyframes ripple-animation {
      from {
        width: 0px;
        height: 0px;
        opacity: 0.5;
      }

      to {
        width: 400px;
        height: 400px;
        opacity: 0;
      }
    }

    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Patrón de huellas con el color primary */
    .vet-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10c-1.1 0-2 .9-2 2v4h-4c-1.1 0-2 .9-2 2s.9 2 2 2h4v4c0 1.1.9 2 2 2s2-.9 2-2v-4h4c1.1 0 2-.9 2-2s-.9-2-2-2h-4v-4c0-1.1-.9-2-2-2zM10 40c-1.1 0-2 .9-2 2v4h-4c-1.1 0-2 .9-2 2s.9 2 2 2h4v4c0 1.1.9 2 2 2s2-.9 2-2v-4h4c1.1 0 2-.9 2-2s-.9-2-2-2h-4v-4c0-1.1-.9-2-2-2z' fill='%23F9A825' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    /* Spinner con colores secundario y primario */
    .spinner-ring {
      border: 3px solid rgba(0, 172, 193, 0.25);
      /* secondary con transparencia */
      border-top: 3px solid #F9A825;
      /* primary */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin-slow 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-soft {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.03);
        opacity: 0.95;
      }
    }

    .animate-brand-pulse {
      animation: pulse-soft 2.5s ease-in-out infinite;
    }

    /* Transición de la barra de progreso */
    #progress-bar {
      transition: width 0.5s ease-out;
    }
  </style>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script type="module" crossorigin src="/assets/index-CsZqG-n0.js"></script>

  <div id="app"></div>
</body>

</html>
